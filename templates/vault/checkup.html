{% extends "base.html" %}
{% block title %}Checkup{% endblock title %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Password Checkup</h2>
        <button class="btn btn-outline-primary btn-sm" onclick="runCheckup()"><i class="bi bi-arrow-clockwise me-1"></i>Rescan</button>
    </div>
    <div id="loading" class="text-center mt-4">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Checking passwords...</p>
    </div>
    <ul id="results-list" class="list-group" style="display:none;"></ul>
    <div id="empty-state" class="container text-center mt-5" style="display:none;">
        <h5>No items found to check.</h5>
    </div>

    <script>
        async function checkPwned(hashPrefix, hashSuffix) {
            const response = await fetch(`https://api.pwnedpasswords.com/range/${hashPrefix}`, {
                headers: { "Add-Padding": "true" }
            });
            const text = await response.text();
            const lines = text.split('\r\n');

            for (const line of lines) {
                const [suffix, count] = line.split(":");
                if (suffix && suffix.trim() === hashSuffix) {
                    return parseInt(count, 10);
                }
            }
            return 0;
        }

        function renderResult(name, count) {
            const isHigh = count > 0;
            const li = document.createElement("li");
            li.className = "list-group-item border rounded d-flex justify-content-between align-items-start list-results mb-3";
            li.innerHTML = `
                <div class="ms-2 me-auto">
                    <div class="fw-bold">${capitalize(name)}</div>
                    <p>${isHigh ? `Exposed ${count} times` : "No breaches found."}</p>
                    <small class="text-muted">${isHigh ? "Changing this password is recommended." : "This password appears to be safe."}</small>
                </div>
                <span class="badge ${isHigh ? "bg-danger" : "bg-success"} rounded-pill">
                    ${isHigh ? "High Risk" : "Safe"}
                </span>`;
            return li;
        }

        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        async function runCheckup() {
            const loading = document.getElementById("loading");
            const list = document.getElementById("results-list");
            const emptyState = document.getElementById("empty-state");

            // reset state
            loading.style.display = "block";
            list.style.display = "none";
            list.innerHTML = "";
            emptyState.style.display = "none";

            const res = await fetch("{% url 'vault:checkup_api' %}");
            const { items } = await res.json();

            loading.style.display = "none";
            if (!items.length) {
                emptyState.style.display = "block";
                return;
            }
            list.style.display = "block";

            const checks = items.map(({ name, hash_prefix, hash_suffix }) =>
                checkPwned(hash_prefix, hash_suffix)
                    .then(count => ({ name, count }))
                    .catch(() => ({ name, count: -1 }))
            );

            for (const check of checks) {
                const { name, count } = await check;
                list.appendChild(renderResult(name, count));
            }
        }
        runCheckup();
    </script>
{% endblock content %}
